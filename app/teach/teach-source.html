<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>TEACH Steering Committee Review</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-pale: #e8f8f2;
      --green-mid: #9FE1CB;
      --blue-pale: #EFF6FF;
      --blue: #1e60b8;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --bg-primary: #ffffff;
      --bg-secondary: #f7f8fa;
      --bg-page: #f1f3f5;
      --border: #e5e7eb;
      --border-light: #f0f1f3;
      --ff-display: 'DM Serif Display', Georgia, serif;
      --ff-body: 'Inter', system-ui, sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
    }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--ff-body);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2.5rem 1rem 5rem;
    }
    .card {
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .hero {
      background: linear-gradient(140deg, #0a5c44 0%, #1D9E75 55%, #4ecba0 100%);
      padding: 2.5rem 2.5rem 2.25rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before { content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%; background: rgba(255,255,255,0.05); right: -70px; top: -90px; }
    .hero::after { content: ''; position: absolute; width: 170px; height: 170px; border-radius: 50%; background: rgba(255,255,255,0.04); left: 50px; bottom: -70px; }
    .hero-label { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.65); margin-bottom: 10px; position: relative; z-index: 1; }
    .hero-title { font-family: var(--ff-display); font-size: 28px; font-weight: 400; color: #fff; line-height: 1.2; margin-bottom: 10px; position: relative; z-index: 1; }
    .hero-sub { font-size: 13.5px; color: rgba(255,255,255,0.78); line-height: 1.65; max-width: 520px; position: relative; z-index: 1; }
    .hero-chips { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; position: relative; z-index: 1; }
    .chip { font-size: 11px; color: rgba(255,255,255,0.88); background: rgba(255,255,255,0.13); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
    .chip i { margin-right: 4px; vertical-align: -1px; }
    .prog-wrap { padding: 1.5rem 2.5rem 0; }
    .prog-track { height: 3px; background: var(--bg-secondary); border-radius: 2px; }
    .prog-fill { height: 3px; border-radius: 2px; background: var(--green); transition: width 0.5s cubic-bezier(.4,0,.2,1); }
    .prog-row { display: flex; justify-content: space-between; margin-top: 8px; margin-bottom: 1.1rem; }
    .prog-step { font-size: 12px; color: var(--text-secondary); }
    .prog-count { font-size: 12px; font-weight: 500; color: var(--green); }
    .dots { display: flex; gap: 5px; padding: 0 2.5rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg-secondary); border: 1px solid var(--border); transition: all 0.3s; }
    .dot.done { background: var(--green-mid); border-color: var(--green); }
    .dot.active { background: var(--green); border-color: var(--green-dark); width: 22px; border-radius: 4px; }
    .body { padding: 0 2.5rem 2.5rem; }
    .sec-eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .sec-pill { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--green-dark); background: var(--green-pale); padding: 3px 11px; border-radius: 20px; }
    .sec-title { font-family: var(--ff-display); font-size: 22px; font-weight: 400; color: var(--text-primary); margin-bottom: 1.1rem; line-height: 1.3; }
    .hint-bar { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text-secondary); background: var(--bg-secondary); border-left: 2.5px solid var(--green); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 1.5rem; line-height: 1.55; }
    .hint-bar + .hint-bar { margin-top: -0.85rem; border-left-color: var(--blue); }
    .hint-bar i { color: var(--green); flex-shrink: 0; margin-top: 1px; font-size: 16px; }
    .icard { border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.4rem; margin-bottom: 0.85rem; background: var(--bg-primary); transition: border-color 0.2s; }
    .icard.rated { border-color: var(--green-mid); }
    .icard-top { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 11px; flex-wrap: wrap; }
    .tag { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 6px; white-space: nowrap; }
    .tag-n { background: var(--green-pale); color: var(--green-dark); }
    .tag-s { background: var(--bg-secondary); color: var(--text-secondary); }
    .tag-h { background: var(--blue-pale); color: var(--blue); }
    .chk { width: 19px; height: 19px; border-radius: 50%; background: var(--green); display: inline-flex; align-items: center; justify-content: center; margin-left: auto; flex-shrink: 0; }
    .chk i { font-size: 11px; color: #fff; }
    .itext { font-size: 14px; color: var(--text-primary); line-height: 1.72; margin-bottom: 1.1rem; }
    .likert { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .lopt input { display: none; }
    .lopt label { display: flex; flex-direction: column; align-items: center; padding: 11px 4px 9px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; gap: 5px; background: var(--bg-secondary); }
    .lopt label:hover { border-color: var(--green); background: var(--green-pale); }
    .lopt input:checked + label { background: var(--green); border-color: var(--green-dark); }
    .lnum { font-size: 19px; font-weight: 500; color: var(--text-primary); }
    .lopt input:checked + label .lnum { color: #fff; }
    .ltxt { font-size: 10px; color: var(--text-secondary); text-align: center; line-height: 1.3; }
    .lopt input:checked + label .ltxt { color: rgba(255,255,255,0.85); }
    .cbox { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1.15rem 1.3rem; margin-top: 0.5rem; margin-bottom: 1.75rem; }
    .cbox-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
    .cbox-hint { font-size: 12.5px; color: var(--text-secondary); margin-bottom: 10px; }
    textarea { width: 100%; font-size: 14px; padding: 10px 13px; border: 1px solid var(--border); border-radius: 9px; resize: vertical; min-height: 80px; background: var(--bg-primary); color: var(--text-primary); font-family: var(--ff-body); line-height: 1.6; }
    textarea:focus { outline: none; border-color: var(--green); }
    .pform { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.25rem; }
    .pform-full { grid-column: 1 / -1; }
    .field label { font-size: 12.5px; font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 5px; }
    .field input, .field select { width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: 9px; font-size: 14px; background: var(--bg-primary); color: var(--text-primary); font-family: var(--ff-body); }
    .field input:focus, .field select:focus { outline: none; border-color: var(--green); }
    .field input::placeholder { color: var(--text-secondary); opacity: 0.55; }
    .intro-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.72; margin-bottom: 1.75rem; padding: 1.1rem 1.3rem; background: var(--bg-secondary); border-radius: 10px; }
    .intro-desc p { margin-bottom: 0.85rem; }
    .intro-desc p:last-child { margin-bottom: 0; }
    .intro-steps { display: grid; gap: 7px; margin-top: 0.9rem; }
    .intro-step { display: flex; align-items: flex-start; gap: 9px; }
    .intro-step i { color: var(--green); font-size: 16px; margin-top: 3px; flex-shrink: 0; }
    .intro-desc strong { color: var(--text-primary); font-weight: 500; }
    .privacy-note { font-size: 12px; color: var(--text-secondary); margin-top: -0.5rem; margin-bottom: 1.25rem; line-height: 1.55; display: flex; align-items: flex-start; gap: 7px; }
    .privacy-note i { color: var(--green); margin-top: 1px; flex-shrink: 0; }
    .alert { padding: 12px 15px; border-radius: 9px; font-size: 13.5px; margin-bottom: 1rem; border: 1px solid; display: flex; align-items: flex-start; gap: 9px; line-height: 1.5; }
    .alert i { margin-top: 1px; flex-shrink: 0; }
    .alert-warn { background: #fef3e2; color: #7c4a00; border-color: #f5a623; }
    .alert-ok { background: var(--green-pale); color: var(--green-dark); border-color: var(--green); }
    .alert-err { background: #fef0f0; color: #8b1a1a; border-color: #e74c3c; }
    .nav { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 1.75rem; }
    .btn { padding: 11px 22px; border: 1px solid var(--border); border-radius: 9px; font-size: 14px; cursor: pointer; background: transparent; color: var(--text-primary); font-family: var(--ff-body); display: inline-flex; align-items: center; gap: 7px; transition: all 0.15s; }
    .btn:hover { background: var(--bg-secondary); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--green); color: #fff; border-color: var(--green-dark); font-weight: 500; }
    .btn-primary:hover:not(:disabled) { background: var(--green-dark); }
    .btn-ghost { color: var(--text-secondary); border-color: transparent; }
    .btn-ghost:hover { background: var(--bg-secondary); border-color: var(--border); }
    .final-hero { text-align: center; padding: 2rem 0 1.5rem; }
    .final-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--green-pale); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .final-icon i { font-size: 30px; color: var(--green); }
    .final-title { font-family: var(--ff-display); font-size: 24px; font-weight: 400; color: var(--text-primary); margin-bottom: 7px; }
    .final-sub { font-size: 14px; color: var(--text-secondary); }
    .summ { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1.1rem 1.3rem; margin-bottom: 1.25rem; }
    .summ-title { font-size: 13.5px; font-weight: 500; color: var(--text-primary); margin-bottom: 11px; }
    .summ-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 14px; }
    .summ-row:last-child { border-bottom: none; }
    .summ-k { color: var(--text-secondary); }
    .summ-v { font-weight: 500; color: var(--text-primary); }
    .submit-box { border: 1px dashed var(--border); border-radius: 14px; padding: 1.75rem; text-align: center; }
    .submit-box p { font-size: 13.5px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.65; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      body { padding: 1rem 0.5rem 4rem; }
      .hero { padding: 1.75rem 1.25rem 1.5rem; }
      .hero-title { font-size: 22px; }
      .prog-wrap { padding: 1.25rem 1.25rem 0; }
      .dots { padding: 0 1.25rem; }
      .body { padding: 0 1.25rem 1.75rem; }
      .pform { grid-template-columns: 1fr; }
      .pform-full { grid-column: 1; }
      .likert { grid-template-columns: repeat(5, 1fr); gap: 4px; }
      .lnum { font-size: 16px; }
      .ltxt { font-size: 9px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const ACCESS_KEY = "9436a6a1-aa89-4bab-9158-433f0db6b152";

    const SECTIONS = [
      { id: "intro", label: "Your details", type: "participant" },
      { id: "title-abstract", label: "Title and abstract", imrad: "Title / Abstract", items: [
        { n: "1", sub: "Title", text: "Include a term that identifies the study as educational in nature (for example curriculum, simulation, workshop, competency training, faculty development) and state the study design (for example randomised trial, pre-post study, mixed-methods) to facilitate indexing and retrieval.", novel: false },
        { n: "2a", sub: "Structured abstract", text: "Provide a structured abstract with clearly labelled sections: Background, Objectives, Design, Setting, Participants, Intervention, Outcomes, Results, Conclusions.", novel: false },
        { n: "2b", sub: "Registration", text: "State the study registration number and the name of the registry in the abstract, where applicable.", novel: false }
      ], commentPrompt: "Any comments on the Title and Abstract items?" },
      { id: "introduction", label: "Introduction", imrad: "Introduction", items: [
        { n: "3a", sub: "Background", text: "Describe the educational problem or learning gap the study addresses, with reference to existing evidence on learner performance or competency deficiencies.", novel: false },
        { n: "3b", sub: "Theoretical framework", text: "State the educational theory or conceptual framework underpinning the intervention (for example experiential learning, constructivism, deliberate practice, situated learning).", novel: true },
        { n: "3c", sub: "Kirkpatrick level", text: "Specify the Kirkpatrick level or levels the study targets: Level 1 (Reaction), Level 2 (Learning), Level 3 (Behaviour), Level 4 (Results).", novel: true },
        { n: "4", sub: "Objectives", text: "State the study objectives or research questions in terms that map directly to the outcomes being measured.", novel: false }
      ], commentPrompt: "Any comments on the Introduction items?" },
      { id: "design", label: "Study design", imrad: "Methods", note: "Some items in this section apply only to studies whose design includes them, for example randomised or controlled designs. Rate whether the item should be reported when it applies, not whether every study will use it.", items: [
        { n: "5a", sub: "Design", text: "Name the study design using standard terminology (for example randomised controlled trial, quasi-experimental, pre-post, time-series, cross-sectional) and justify the choice in relation to the research question, available resources, and ethical considerations.", novel: false },
        { n: "5b", sub: "Timeline", text: "Provide a timeline or study flow identifying key milestones: recruitment, intervention delivery, assessment points, and follow-up.", novel: true }
      ], commentPrompt: "Any comments on the Study Design items?" },
      { id: "participants", label: "Participants", imrad: "Methods", items: [
        { n: "6a", sub: "Eligibility", text: "State the eligibility criteria for participants, including health profession, training level or year, institution type, and any prior experience requirements.", novel: false },
        { n: "6b", sub: "Setting", text: "Describe the educational setting, including whether the study was single-centre or multi-centre, the type of learning environment, and the country or region, with comment on implications for generalisability.", novel: false },
        { n: "6c", sub: "Recruitment", text: "Explain how participants were recruited and whether participation was voluntary, mandatory, or incentivised. Report participation or response rates.", novel: false },
        { n: "6d", sub: "Sample size", text: "Report the sample size rationale. For studies with a formal power calculation, state the assumed effect size, alpha level, power, and the basis for estimates.", novel: false }
      ], commentPrompt: "Any comments on the Participants items?" },
      { id: "intervention", label: "Intervention", imrad: "Methods", items: [
        { n: "7a", sub: "Content", text: "Describe the intervention content in sufficient detail to allow replication: topics covered, learning objectives, instructional methods, and the pedagogical approach.", novel: false },
        { n: "7b", sub: "Format and mode", text: "Report the delivery format (for example lecture, small group, simulation, e-learning, flipped classroom, bedside teaching) and modality (in-person, online, or hybrid). Where the intervention is delivered through artificial intelligence or another automated system, also report the model and version, the access or deployment date, and how it was prompted or configured.", novel: true },
        { n: "7c", sub: "Duration", text: "State the total contact time, number of sessions, length of each session, and spacing between sessions.", novel: false },
        { n: "7d", sub: "Instructors", text: "Describe the qualifications of those delivering the intervention, any standardisation procedures undertaken, and the faculty-to-learner ratio.", novel: false },
        { n: "7e", sub: "Materials", text: "State whether educational materials used (slides, videos, cases, checklists) are available and how they can be accessed.", novel: false },
        { n: "7f", sub: "Fidelity", text: "Describe the steps planned to ensure the intervention was delivered as intended (for example adherence to a facilitator guide, training of instructors, monitoring of dose and engagement). Where fidelity was monitored, report the methods. Where an automated or artificial intelligence system delivers part of the intervention, state what human oversight of its outputs was in place.", novel: true }
      ], commentPrompt: "Any comments on the Intervention items?" },
      { id: "comparator", label: "Comparator", imrad: "Methods", note: "This item applies only to studies that include a comparator or control condition. Rate whether it should be reported when one is present, not whether every study will have one.", items: [
        { n: "8", sub: "Comparator", text: "Describe the control or comparator condition (for example no intervention, standard curriculum, waitlist, or active control) and justify the choice.", novel: false }
      ], commentPrompt: "Any comments on the Comparator item?" },
      { id: "outcomes", label: "Outcomes", imrad: "Methods", items: [
        { n: "9a", sub: "Primary outcome", text: "Specify the primary outcome, the Kirkpatrick level it reflects, the measurement instrument, and the timing of assessment.", novel: true },
        { n: "9b", sub: "Secondary outcomes", text: "Specify all secondary outcomes with their instruments and assessment timing. Distinguish between pre-specified and exploratory outcomes.", novel: false },
        { n: "9c", sub: "Instrument validity", text: "Report validity evidence for the assessment instruments (content, construct, or criterion validity). For established tools, provide a citation; for new tools, report reliability coefficients and standard error of measurement. Where an artificial intelligence or automated system scored or generated any assessment, state this and report how its scoring was validated against a human or established standard.", novel: true }
      ], commentPrompt: "Any comments on the Outcomes items?" },
      { id: "allocation", label: "Allocation and blinding", imrad: "Methods", note: "These items apply only to studies whose design includes randomisation, allocation, or blinding. Rate whether the item should be reported when it applies, not whether every study will use it.", items: [
        { n: "10a", sub: "Randomisation", text: "For randomised studies, describe the method used to generate the allocation sequence and the type of randomisation (for example simple, blocked, stratified, cluster). For non-randomised studies, explain how groups were formed.", novel: false },
        { n: "10b", sub: "Allocation concealment", text: "State whether and how the allocation sequence was concealed until participants were assigned (for example central allocation, sequentially numbered opaque sealed envelopes). If concealment was not used, state this.", novel: false },
        { n: "10c", sub: "Blinding", text: "State who was blinded (participants, instructors, outcome assessors, data analysts). Where full blinding was not feasible, distinguish between studies with blinded assessors and those with no blinding, and describe the potential for bias.", novel: false }
      ], commentPrompt: "Any comments on the Allocation and Blinding items?" },
      { id: "analysis", label: "Statistical analysis", imrad: "Methods", items: [
        { n: "11", sub: "Analysis and effect size", text: "Describe the statistical analysis plan including the primary analysis method, handling of missing data, unit of analysis, and any adjustments for clustering or covariates. State the plan to report effect sizes (for example Cohen's d, odds ratio) and confidence intervals alongside p-values.", novel: false }
      ], commentPrompt: "Any comments on the Statistical Analysis item?" },
      { id: "results", label: "Results", imrad: "Results", items: [
        { n: "12", sub: "Participant flow", text: "Report participant flow at each stage: enrolled, allocated, intervention received, completed, analysed, withdrawn, and lost to follow-up, with reasons given.", novel: false },
        { n: "13", sub: "Baseline characteristics", text: "Report baseline characteristics of participants by group, including demographics, training level, prior experience, and pretest scores where applicable.", novel: false },
        { n: "14", sub: "Primary outcome", text: "Report the primary outcome result with a point estimate, 95% confidence interval, and p-value. Include absolute values for both groups where applicable.", novel: false },
        { n: "15", sub: "Secondary outcomes", text: "Report results for all pre-specified secondary outcomes with effect estimates and confidence intervals. Avoid selective reporting.", novel: false },
        { n: "16", sub: "Fidelity", text: "Report implementation fidelity results: proportion of sessions delivered as planned, learner attendance rates, and intervention dose received.", novel: true },
        { n: "17", sub: "Harms and unintended effects", text: "Report any unintended consequences or adverse effects of the intervention (for example anxiety, disengagement, opportunity cost). If none were observed, state this explicitly.", novel: true }
      ], commentPrompt: "Any comments on the Results items?" },
      { id: "discussion", label: "Discussion", imrad: "Discussion", items: [
        { n: "18a", sub: "Interpretation", text: "Interpret findings in relation to the study objectives and the theoretical framework described in the introduction.", novel: false },
        { n: "18b", sub: "Generalisability", text: "Discuss the extent to which the intervention and findings can be transferred to other institutions, learner groups, cultural contexts, or resource settings.", novel: true },
        { n: "18c", sub: "Limitations", text: "Identify the main limitations, including design constraints, sources of bias, and implementation challenges. Comment on the likely direction of any bias.", novel: false },
        { n: "18d", sub: "Cost and scalability", text: "Discuss the cost, resource requirements, and practical scalability of the intervention to support adoption decisions by other institutions.", novel: true }
      ], commentPrompt: "Any comments on the Discussion items?" },
      { id: "other", label: "Other information", imrad: "Other", items: [
        { n: "19a", sub: "Registration", text: "Provide study registration details (registry name, registration number, date). If not registered, state the reasons.", novel: false },
        { n: "19b", sub: "Ethics", text: "State the ethics committee approval (committee name, approval number) or waiver, and the consent procedures followed.", novel: false },
        { n: "19c", sub: "Funding", text: "Declare all sources of funding and any role funders had in study design, data collection, analysis, or reporting.", novel: false },
        { n: "19d", sub: "Data sharing", text: "State whether anonymised data, educational materials, and analysis code will be shared. Provide a repository link or contact information.", novel: true }
      ], commentPrompt: "Any comments on the Other Information items?" },
      { id: "final", label: "Submit", type: "final" }
    ];

    const LIKERT = [
      { v: 1, long: "Strongly disagree" },
      { v: 2, long: "Disagree" },
      { v: 3, long: "Neutral" },
      { v: 4, long: "Agree" },
      { v: 5, long: "Strongly agree" }
    ];

    let state = {
      step: 0,
      participant: { name: "", email: "", country: "" },
      ratings: {},
      comments: {},
      finalComment: "",
      submitted: false
    };

    function totalItems() { let n = 0; SECTIONS.forEach(s => { if (s.items) n += s.items.length; }); return n; }
    function ratedItems() { return Object.keys(state.ratings).length; }
    function pct() { return Math.round((state.step / (SECTIONS.length - 1)) * 100); }
    function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

    function hero() {
      return `<div class="hero">
        <div class="hero-label">Steering Committee Review</div>
        <div class="hero-title">TEACH Reporting Guideline</div>
        <div class="hero-sub">Transparent Reporting of Educational Interventions and Curriculum Research in Health Professions Education</div>
        <div class="hero-chips">
          <span class="chip"><i class="ti ti-list-check"></i>41 items</span>
          <span class="chip"><i class="ti ti-clock"></i>~15 minutes</span>
          <span class="chip"><i class="ti ti-world"></i>International panel</span>
        </div>
      </div>`;
    }

    function progress() {
      const sec = SECTIONS[state.step];
      const label = state.step === 0 ? 'Getting started' : `Section ${state.step} of ${SECTIONS.length - 2} &mdash; ${sec.label}`;
      return `<div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="pfill" style="width:${pct()}%"></div></div>
        <div class="prog-row">
          <span class="prog-step">${label}</span>
          <span class="prog-count" id="pcount">${ratedItems()}/${totalItems()} items rated</span>
        </div>
      </div>`;
    }

    function dots() {
      let h = '<div class="dots">';
      SECTIONS.forEach((_, i) => {
        let c = 'dot';
        if (i === state.step) c += ' active';
        else if (i < state.step) c += ' done';
        h += `<div class="${c}"></div>`;
      });
      return h + '</div>';
    }

    function renderIntro() {
      const p = state.participant;
      return `${hero()}${progress()}${dots()}<div class="body">
        <div class="sec-eyebrow"><span class="sec-pill">Welcome</span></div>
        <div class="sec-title">Before we begin</div>
        <div class="intro-desc">
          <p>You are invited as a member of the <strong>TEACH steering committee</strong> to review the proposed checklist before it goes to the expert Delphi panel. Your role at this stage is to refine the items, identify problems of wording, scope, or coverage, and confirm the set is ready for formal consensus.</p>
          <div class="intro-steps">
            <div class="intro-step"><i class="ti ti-circle-number-1"></i><span>For each item, rate whether it <strong>should be included</strong> in the checklist that goes forward to the Delphi panel.</span></div>
            <div class="intro-step"><i class="ti ti-circle-number-2"></i><span>Use the 1 to 5 scale, where 1 means Strongly disagree and 5 means Strongly agree.</span></div>
            <div class="intro-step"><i class="ti ti-circle-number-3"></i><span>Items marked <strong style="color:var(--blue)">HPE-specific</strong> are novel to health professions education and warrant your closest attention.</span></div>
            <div class="intro-step"><i class="ti ti-circle-number-4"></i><span>Use the comment boxes generously. At this stage, written feedback on wording, scope, and missing items matters as much as the ratings.</span></div>
            <div class="intro-step"><i class="ti ti-circle-number-5"></i><span>In the Delphi rounds that follow, consensus for inclusion will be defined as <strong>70% or more</strong> of panelists rating an item 4 or 5.</span></div>
            <div class="intro-step"><i class="ti ti-list-search"></i><span>The items below were derived from a scoping review of educational intervention reporting and from existing reporting guidelines, adapted for health professions education.</span></div>
          </div>
        </div>
        <div class="pform">
          <div class="field pform-full"><label>Full name</label><input id="p-name" type="text" value="${p.name}" placeholder="Your full name"></div>
          <div class="field pform-full"><label>Email address</label><input id="p-email" type="email" value="${p.email}" placeholder="name@institution.edu"></div>
          <div class="field pform-full"><label>Country</label><input id="p-country" type="text" value="${p.country}" placeholder="Country"></div>
        </div>
        <div class="privacy-note"><i class="ti ti-lock"></i><span>Your email is collected only so the research team can invite you to the next Delphi round. It will not be shared or used for any other purpose.</span></div>
        <div id="intro-alert"></div>
        <div class="nav"><button class="btn btn-primary" onclick="nextIntro()">Begin rating <i class="ti ti-arrow-right"></i></button></div>
      </div>`;
    }

    function renderSection(sec) {
      let h = `${hero()}${progress()}${dots()}<div class="body">
        <div class="sec-eyebrow"><span class="sec-pill">${sec.imrad}</span></div>
        <div class="sec-title">${sec.label}</div>
        <div class="hint-bar"><i class="ti ti-info-circle"></i>Rate whether each item <strong>should be included</strong> in the final TEACH checklist. &nbsp;1 = Strongly disagree &nbsp;&middot;&nbsp; 5 = Strongly agree</div>
        ${sec.note ? `<div class="hint-bar"><i class="ti ti-alert-circle"></i>${sec.note}</div>` : ''}`;

      sec.items.forEach(item => {
        const key = `item_${item.n}`;
        const isRated = state.ratings[key] !== undefined;
        h += `<div class="icard${isRated ? ' rated' : ''}" id="card_${item.n}">
          <div class="icard-top">
            <span class="tag tag-n">Item ${item.n}</span>
            <span class="tag tag-s">${item.sub}</span>
            ${item.novel ? '<span class="tag tag-h"><i class="ti ti-sparkles" style="font-size:10px;margin-right:3px"></i>HPE-specific</span>' : ''}
            ${isRated ? '<span class="chk"><i class="ti ti-check"></i></span>' : ''}
          </div>
          <div class="itext">${item.text}</div>
          <div class="likert" role="group" aria-label="Rating for item ${item.n}">`;
        LIKERT.forEach(l => {
          const chk = state.ratings[key] === l.v ? 'checked' : '';
          h += `<div class="lopt"><input type="radio" name="${key}" id="${key}_${l.v}" value="${l.v}" ${chk} onchange="rate('${key}',${l.v},'${item.n}')">
            <label for="${key}_${l.v}"><span class="lnum">${l.v}</span><span class="ltxt">${l.long}</span></label></div>`;
        });
        h += `</div></div>`;
      });

      const sk = `sec_${sec.id}`;
      h += `<div class="cbox">
        <div class="cbox-title">${sec.commentPrompt}</div>
        <div class="cbox-hint">Optional &mdash; concerns about wording, scope, or feasibility of items in this section.</div>
        <textarea id="${sk}" placeholder="Your comments..." onchange="state.comments['${sk}']=this.value">${state.comments[sk] || ''}</textarea>
      </div>
      <div id="sec-alert"></div>
      <div class="nav">
        <button class="btn btn-ghost" onclick="goBack()"><i class="ti ti-arrow-left"></i> Back</button>
        <button class="btn btn-primary" onclick="nextSection(${JSON.stringify(sec.items.map(i => i.n))})">Continue <i class="ti ti-arrow-right"></i></button>
      </div></div>`;
      return h;
    }

    function renderFinal() {
      const r = ratedItems(), t = totalItems(), done = r === t;
      return `${hero()}${progress()}${dots()}<div class="body">
        <div class="final-hero">
          <div class="final-icon"><i class="ti ti-${done ? 'circle-check' : 'alert-triangle'}"></i></div>
          <div class="final-title">${done ? 'All items rated &mdash; ready to submit' : 'Almost done'}</div>
          <div class="final-sub">${done ? 'Add any final comments below, then submit your responses.' : 'You have rated ' + r + ' of ' + t + ' items. Please go back to complete any missed sections.'}</div>
        </div>
        <div class="cbox">
          <div class="cbox-title">Is anything important missing from this checklist?</div>
          <div class="cbox-hint">Describe any reporting element you feel should be added to TEACH.</div>
          <textarea id="final-comment" style="min-height:100px" placeholder="Optional..." onchange="state.finalComment=this.value">${state.finalComment}</textarea>
        </div>
        <div class="summ">
          <div class="summ-title">Your submission</div>
          <div class="summ-row"><span class="summ-k">Name</span><span class="summ-v">${state.participant.name}</span></div>
          <div class="summ-row"><span class="summ-k">Email</span><span class="summ-v">${state.participant.email}</span></div>
          <div class="summ-row"><span class="summ-k">Country</span><span class="summ-v">${state.participant.country}</span></div>
          <div class="summ-row"><span class="summ-k">Items rated</span><span class="summ-v" style="color:${done ? 'var(--green)' : '#e07800'}">${r} of ${t}</span></div>
        </div>
        <div class="submit-box">
          <p>Your responses will be sent directly to the TEACH research team. You will see a confirmation once submitted.</p>
          <button class="btn btn-primary" id="submit-btn" onclick="submitForm()" ${!done ? 'disabled' : ''}>
            <i class="ti ti-send"></i> Submit my responses
          </button>
          ${!done ? '<p style="margin-top:10px;font-size:12.5px;color:#b04a00">Please rate all items before submitting.</p>' : ''}
        </div>
        <div id="submit-result"></div>
        <div class="nav" style="margin-top:1.25rem">
          <button class="btn btn-ghost" onclick="goBack()"><i class="ti ti-arrow-left"></i> Back</button>
        </div>
      </div>`;
    }

    function rate(key, val, itemNum) {
      state.ratings[key] = val;
      const card = document.getElementById('card_' + itemNum);
      if (card) {
        card.classList.add('rated');
        if (!card.querySelector('.chk')) {
          const top = card.querySelector('.icard-top');
          const sp = document.createElement('span');
          sp.className = 'chk';
          sp.innerHTML = '<i class="ti ti-check"></i>';
          top.appendChild(sp);
        }
      }
      const pc = document.getElementById('pcount');
      if (pc) pc.textContent = ratedItems() + '/' + totalItems() + ' items rated';
    }

    function nextIntro() {
      const name = document.getElementById('p-name').value.trim();
      const email = document.getElementById('p-email').value.trim();
      const country = document.getElementById('p-country').value.trim();
      if (!name || !email || !country) {
        document.getElementById('intro-alert').innerHTML = '<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i> Please complete all fields before continuing.</div>';
        return;
      }
      if (!validEmail(email)) {
        document.getElementById('intro-alert').innerHTML = '<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i> Please enter a valid email address.</div>';
        return;
      }
      state.participant = { name, email, country };
      state.step = 1; render(); window.scrollTo(0, 0);
    }

    function nextSection(nums) {
      const sk = `sec_${SECTIONS[state.step].id}`;
      const ta = document.getElementById(sk);
      if (ta) state.comments[sk] = ta.value;
      const unrated = nums.filter(n => state.ratings[`item_${n}`] === undefined);
      if (unrated.length > 0) {
        const el = document.getElementById('sec-alert');
        if (el) el.innerHTML = `<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i> Please rate all items. Unrated: <strong>Item ${unrated.join(', Item ')}</strong>.</div>`;
        return;
      }
      state.step++; render(); window.scrollTo(0, 0);
    }

    function goBack() { if (state.step > 0) { state.step--; render(); window.scrollTo(0, 0); } }

    async function submitForm() {
      if (document.getElementById('final-comment')) state.finalComment = document.getElementById('final-comment').value;
      const btn = document.getElementById('submit-btn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Submitting...'; }

      const formData = new FormData();
      formData.append('access_key', ACCESS_KEY);
      formData.append('subject', 'TEACH Delphi Round 1 — New submission: ' + state.participant.name);
      formData.append('from_name', 'TEACH Delphi Form');
      formData.append('replyto', state.participant.email);
      formData.append('Participant name', state.participant.name);
      formData.append('Email', state.participant.email);
      formData.append('Country', state.participant.country);
      formData.append('Submitted at', new Date().toISOString());

      SECTIONS.forEach(sec => {
        if (!sec.items) return;
        sec.items.forEach(item => {
          const key = `item_${item.n}`;
          formData.append(`Item ${item.n} — ${item.sub}`, state.ratings[key] || 'Not rated');
        });
        const ck = `sec_${sec.id}`;
        if (state.comments[ck] && state.comments[ck].trim()) {
          formData.append(`Comment — ${sec.label}`, state.comments[ck]);
        }
      });
      if (state.finalComment && state.finalComment.trim()) {
        formData.append('Missing items comment', state.finalComment);
      }

      try {
        const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: formData });
        const data = await res.json();
        const el = document.getElementById('submit-result');
        if (data.success) {
          state.submitted = true;
          if (el) el.innerHTML = `<div class="alert alert-ok" style="margin-top:1rem"><i class="ti ti-circle-check"></i> <strong>Submitted successfully.</strong> Thank you, ${state.participant.name}. The TEACH research team has received your responses.</div>`;
          if (btn) { btn.innerHTML = '<i class="ti ti-check"></i> Submitted'; btn.style.background = 'var(--green-dark)'; btn.style.cursor = 'default'; }
        } else {
          if (el) el.innerHTML = `<div class="alert alert-err"><i class="ti ti-alert-circle"></i> Submission failed. Please try again or email your responses to teachguideline@gmail.com.</div>`;
          if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-send"></i> Try again'; }
        }
      } catch (e) {
        const el = document.getElementById('submit-result');
        if (el) el.innerHTML = `<div class="alert alert-err"><i class="ti ti-alert-circle"></i> Connection error. Please check your internet and try again, or email teachguideline@gmail.com directly.</div>`;
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-send"></i> Try again'; }
      }
    }

    function render() {
      const sec = SECTIONS[state.step];
      const app = document.getElementById('app');
      let inner = '';
      if (sec.type === 'participant') inner = renderIntro();
      else if (sec.type === 'final') inner = renderFinal();
      else inner = renderSection(sec);
      app.innerHTML = `<div class="card">${inner}</div>`;
    }
    render();
  </script>
</body>
</html>
